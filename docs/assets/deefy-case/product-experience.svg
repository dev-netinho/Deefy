<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Evidencia visual da experiencia final do Deefy</title>
  <desc id="desc">Interface estilizada do Deefy com sidebar, busca, playlists globais, cards de artista e player ativo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020504"/>
      <stop offset=".54" stop-color="#07130f"/>
      <stop offset="1" stop-color="#102923"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f6f5d"/>
      <stop offset="1" stop-color="#111614"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b2c22"/>
      <stop offset="1" stop-color="#0e1513"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000" flood-opacity=".5"/>
    </filter>
    <pattern id="grain" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".75" fill="#ffffff" opacity=".08"/>
      <circle cx="4" cy="3" r=".55" fill="#10d9b3" opacity=".08"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grain)" opacity=".6"/>
  <circle cx="1120" cy="170" r="260" fill="#10d9b3" opacity=".12"/>
  <circle cx="420" cy="760" r="280" fill="#f0b45b" opacity=".08"/>

  <g transform="translate(54 54)" filter="url(#shadow)">
    <rect width="1332" height="792" rx="42" fill="#050807" stroke="#ffffff" stroke-opacity=".08"/>
    <rect width="226" height="792" rx="42" fill="#020303"/>
    <text x="50" y="104" fill="#10d9b3" font-family="Fraunces, Georgia, serif" font-size="54" font-weight="850">Deefy</text>

    <g font-family="Archivo, Arial, sans-serif" font-size="18" font-weight="800">
      <text x="52" y="194" fill="#5d6b66">Home</text>
      <rect x="32" y="230" width="162" height="54" rx="18" fill="#0e2c25"/>
      <text x="52" y="264" fill="#10d9b3">Playlists</text>
      <text x="52" y="336" fill="#5d6b66">Artists</text>
      <text x="52" y="388" fill="#5d6b66">Admin</text>
      <text x="52" y="710" fill="#5d6b66">Logout</text>
    </g>

    <g transform="translate(278 64)">
      <text x="0" y="36" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="900">Descoberta integrada</text>
      <text x="0" y="74" fill="#8ea49c" font-family="Archivo, Arial, sans-serif" font-size="19">Busca, playlists globais, artistas, favoritos e player usando API real.</text>
      <rect x="0" y="116" width="590" height="58" rx="20" fill="#0b1210" stroke="#214e45"/>
      <text x="26" y="153" fill="#8ea49c" font-family="Archivo, Arial, sans-serif" font-size="17">Pesquisar por musica, artista, genero, album ou playlist...</text>
      <g font-family="Archivo, Arial, sans-serif" font-size="14" font-weight="900">
        <rect x="0" y="198" width="78" height="36" rx="18" fill="#10d9b3"/>
        <text x="24" y="222" fill="#06231d">Tudo</text>
        <rect x="90" y="198" width="94" height="36" rx="18" fill="#0b1210" stroke="#214e45"/>
        <text x="113" y="222" fill="#b9c9c3">Generos</text>
        <rect x="196" y="198" width="92" height="36" rx="18" fill="#0b1210" stroke="#214e45"/>
        <text x="220" y="222" fill="#b9c9c3">Artistas</text>
        <rect x="300" y="198" width="96" height="36" rx="18" fill="#0b1210" stroke="#214e45"/>
        <text x="322" y="222" fill="#b9c9c3">Playlists</text>
      </g>
    </g>

    <g transform="translate(278 360)">
      <text x="0" y="0" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="900">Explore novos estilos</text>
      <g transform="translate(0 34)">
        <rect width="270" height="152" rx="28" fill="url(#cardA)" stroke="#10d9b3" stroke-opacity=".22"/>
        <circle cx="214" cy="42" r="48" fill="#10d9b3" opacity=".16"/>
        <text x="26" y="98" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="900">TRASH</text>
        <text x="26" y="126" fill="#b9c9c3" font-family="Archivo, Arial, sans-serif" font-size="15">toca fila real por genero</text>
      </g>
      <g transform="translate(300 34)">
        <rect width="270" height="152" rx="28" fill="url(#cardB)" stroke="#f0b45b" stroke-opacity=".22"/>
        <circle cx="214" cy="42" r="48" fill="#f0b45b" opacity=".15"/>
        <text x="26" y="98" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="900">CAOS</text>
        <text x="26" y="126" fill="#b9c9c3" font-family="Archivo, Arial, sans-serif" font-size="15">playlist global importada</text>
      </g>
      <g transform="translate(600 34)">
        <rect width="270" height="152" rx="28" fill="#111917" stroke="#ffffff" stroke-opacity=".1"/>
        <circle cx="214" cy="42" r="48" fill="#10d9b3" opacity=".14"/>
        <text x="26" y="98" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="900">ARTISTAS</text>
        <text x="26" y="126" fill="#b9c9c3" font-family="Archivo, Arial, sans-serif" font-size="15">catalogo e recomendacoes</text>
      </g>
    </g>

    <g transform="translate(278 616)">
      <text x="0" y="0" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="26" font-weight="900">Musicas recentes</text>
      <g font-family="Archivo, Arial, sans-serif" font-size="17">
        <rect y="28" width="870" height="58" rx="18" fill="#0b1210"/>
        <circle cx="30" cy="57" r="18" fill="#10d9b3"/>
        <text x="66" y="52" fill="#ffffff" font-weight="800">Ratamahatta</text>
        <text x="66" y="75" fill="#8ea49c" font-size="14">Sepultura - arquivoUrl normalizado</text>
        <text x="794" y="63" fill="#10d9b3" font-family="JetBrains Mono, monospace" font-size="14">03:35</text>
        <rect y="100" width="870" height="58" rx="18" fill="#0b1210"/>
        <circle cx="30" cy="129" r="18" fill="#f0b45b"/>
        <text x="66" y="124" fill="#ffffff" font-weight="800">Roots Bloody Roots</text>
        <text x="66" y="147" fill="#8ea49c" font-size="14">playlist global sem edicao para usuario comum</text>
        <text x="794" y="135" fill="#10d9b3" font-family="JetBrains Mono, monospace" font-size="14">03:32</text>
      </g>
    </g>

    <g transform="translate(940 132)">
      <rect width="326" height="440" rx="34" fill="#0b1210" stroke="#214e45"/>
      <text x="32" y="56" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="24" font-weight="900">Player ativo</text>
      <rect x="32" y="88" width="262" height="210" rx="28" fill="#0f6f5d"/>
      <circle cx="163" cy="192" r="64" fill="#10d9b3" opacity=".55"/>
      <path d="M148 158l60 34-60 34z" fill="#06231d"/>
      <text x="32" y="342" fill="#ffffff" font-family="Archivo, Arial, sans-serif" font-size="22" font-weight="900">Canyon Jam</text>
      <text x="32" y="370" fill="#8ea49c" font-family="Archivo, Arial, sans-serif" font-size="16">rota compartilhavel /music/:id</text>
      <rect x="32" y="404" width="262" height="8" rx="4" fill="#183e37"/>
      <rect x="32" y="404" width="154" height="8" rx="4" fill="#10d9b3"/>
    </g>
  </g>
</svg>
