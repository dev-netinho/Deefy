<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Evidencia visual do Trello da Fase A</title>
  <desc id="desc">Quadro Trello estilizado com cards de arquitetura, documentacao, contratos de servico e impedimentos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1714"/>
      <stop offset=".48" stop-color="#102821"/>
      <stop offset="1" stop-color="#261a11"/>
    </linearGradient>
    <linearGradient id="modal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d3432"/>
      <stop offset="1" stop-color="#202524"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#ffffff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity=".9"/>
  <circle cx="110" cy="125" r="240" fill="#10d9b3" opacity=".11"/>
  <circle cx="1260" cy="720" r="260" fill="#f0b45b" opacity=".12"/>

  <g opacity=".86">
    <rect x="52" y="120" width="328" height="680" rx="28" fill="#101715" stroke="#ffffff" stroke-opacity=".07"/>
    <text x="82" y="174" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="24" font-weight="800">Sprint 1</text>
    <text x="82" y="210" fill="#8ea49c" font-family="Archivo, Arial, sans-serif" font-size="16">Servicos e negocios</text>

    <g transform="translate(80 248)">
      <rect width="252" height="96" rx="18" fill="#19211f"/>
      <rect x="18" y="18" width="72" height="24" rx="8" fill="#194d42"/>
      <text x="32" y="35" fill="#7ef0d7" font-family="Archivo, Arial, sans-serif" font-size="12" font-weight="700">Integracao</text>
      <text x="18" y="64" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="17" font-weight="700">CARD 1 - Arquitetura base</text>
    </g>
    <g transform="translate(80 366)">
      <rect width="252" height="96" rx="18" fill="#19211f"/>
      <rect x="18" y="18" width="72" height="24" rx="8" fill="#2d5743"/>
      <text x="32" y="35" fill="#a7eeba" font-family="Archivo, Arial, sans-serif" font-size="12" font-weight="700">Padroes</text>
      <text x="18" y="64" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="17" font-weight="700">CARD 2 - Setup e fluxo</text>
    </g>
    <g transform="translate(80 484)">
      <rect width="252" height="96" rx="18" fill="#19211f"/>
      <rect x="18" y="18" width="72" height="24" rx="8" fill="#3b6a5f"/>
      <text x="31" y="35" fill="#bdf3e7" font-family="Archivo, Arial, sans-serif" font-size="12" font-weight="700">Backend</text>
      <text x="18" y="64" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="17" font-weight="700">CARD 3 - Contratos</text>
    </g>
  </g>

  <g opacity=".7">
    <rect x="1048" y="122" width="328" height="680" rx="28" fill="#101715" stroke="#ffffff" stroke-opacity=".07"/>
    <text x="1078" y="174" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="24" font-weight="800">Concluido</text>
    <g transform="translate(1078 248)">
      <rect width="252" height="96" rx="18" fill="#19211f"/>
      <rect x="18" y="18" width="80" height="24" rx="8" fill="#194d42"/>
      <text x="32" y="35" fill="#7ef0d7" font-family="Archivo, Arial, sans-serif" font-size="12" font-weight="700">Integracao</text>
      <text x="18" y="64" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="16" font-weight="700">CARD 10 - Contrato p/ G3</text>
    </g>
    <g transform="translate(1078 366)">
      <rect width="252" height="96" rx="18" fill="#19211f"/>
      <rect x="18" y="18" width="86" height="24" rx="8" fill="#274f44"/>
      <text x="32" y="35" fill="#9ef1dd" font-family="Archivo, Arial, sans-serif" font-size="12" font-weight="700">Arquitetura</text>
      <text x="18" y="64" fill="#dce8e2" font-family="Archivo, Arial, sans-serif" font-size="16" font-weight="700">CARD 11 - Decisoes tecnicas</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="96" width="620" height="708" rx="32" fill="url(#modal)" stroke="#ffffff" stroke-opacity=".12"/>
    <rect x="420" y="96" width="620" height="72" rx="32" fill="#343c3a"/>
    <rect x="420" y="136" width="620" height="32" fill="#343c3a"/>
    <rect x="452" y="124" width="110" height="30" rx="8" fill="#535b58"/>
    <text x="472" y="145" fill="#f0f4ef" font-family="Archivo, Arial, sans-serif" font-size="15" font-weight="800">Concluido</text>
    <circle cx="988" cy="132" r="8" fill="none" stroke="#dce8e2" stroke-width="3" opacity=".8"/>
    <path d="M1008 124l16 16M1024 124l-16 16" stroke="#dce8e2" stroke-width="3" stroke-linecap="round" opacity=".8"/>

    <text x="474" y="232" fill="#f4f2e9" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="900">CARD 1 - Estruturar repositorio</text>
    <text x="474" y="280" fill="#f4f2e9" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="900">e arquitetura base</text>
    <rect x="474" y="320" width="116" height="38" rx="12" fill="#194d42"/>
    <text x="497" y="345" fill="#82f0d8" font-family="Archivo, Arial, sans-serif" font-size="15" font-weight="800">Arquitetura</text>
    <rect x="604" y="320" width="98" height="38" rx="12" fill="#375443"/>
    <text x="629" y="345" fill="#d3f5c9" font-family="Archivo, Arial, sans-serif" font-size="15" font-weight="800">Backend</text>

    <text x="474" y="420" fill="#cad5d0" font-family="Archivo, Arial, sans-serif" font-size="19" font-weight="700">Checklist tecnico</text>
    <rect x="474" y="450" width="500" height="10" rx="5" fill="#9ad766"/>
    <text x="474" y="492" fill="#f4f2e9" font-family="Archivo, Arial, sans-serif" font-size="18">15/15 itens concluidos</text>

    <g font-family="Archivo, Arial, sans-serif" font-size="21" fill="#dce8e2">
      <g transform="translate(474 538)">
        <rect width="22" height="22" rx="6" fill="#72a8ff"/>
        <path d="M6 11l4 4 7-9" stroke="#0d1f1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="19">Criar projeto Spring Boot com Maven</text>
      </g>
      <g transform="translate(474 584)">
        <rect width="22" height="22" rx="6" fill="#72a8ff"/>
        <path d="M6 11l4 4 7-9" stroke="#0d1f1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="19">Definir pacotes controller, service e repository</text>
      </g>
      <g transform="translate(474 630)">
        <rect width="22" height="22" rx="6" fill="#72a8ff"/>
        <path d="M6 11l4 4 7-9" stroke="#0d1f1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="19">Padronizar contratos para integracao</text>
      </g>
      <g transform="translate(474 676)">
        <rect width="22" height="22" rx="6" fill="#72a8ff"/>
        <path d="M6 11l4 4 7-9" stroke="#0d1f1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="19">Registrar decisoes e impedimentos</text>
      </g>
    </g>
  </g>

  <text x="64" y="850" fill="#a7b8b1" font-family="JetBrains Mono, monospace" font-size="16">Fase A - tech lead, contratos, Trello e alinhamento entre grupos</text>
</svg>
