spring.application.name=Deefy

spring.datasource.url=${SPRING_DATASOURCE_URL}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:55MB}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.openapi.public-server-url=${APP_OPENAPI_PUBLIC_SERVER_URL:}
app.openapi.local-server-url=${APP_OPENAPI_LOCAL_SERVER_URL:http://localhost:8080}

# Tempo de vida do token de redefinição (15 minutos = 900000 ms)
jwt.password.reset.expiration=${JWT_RESET_EXPIRATION:900000}
jwt.account.activation.expiration=${JWT_ACCOUNT_ACTIVATION_EXPIRATION:900000}

resend.api.key=${RESEND_API_KEY:}
resend.api.url=${RESEND_API_URL:https://api.resend.com/emails}
resend.from=${RESEND_FROM:Deefy <onboarding@resend.dev>}

supabase.project-url=${SUPABASE_PROJECT_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.public-base-url=${SUPABASE_STORAGE_PUBLIC_BASE_URL:}
supabase.storage.profile-bucket=${SUPABASE_STORAGE_PROFILE_BUCKET:fotos de perfil}
supabase.storage.profile-max-size-bytes=${SUPABASE_STORAGE_PROFILE_MAX_SIZE_BYTES:5242880}
supabase.storage.image-bucket=${SUPABASE_STORAGE_IMAGE_BUCKET:imagens}
supabase.storage.music-bucket=${SUPABASE_STORAGE_MUSIC_BUCKET:musicas}
supabase.storage.image-max-size-bytes=${SUPABASE_STORAGE_IMAGE_MAX_SIZE_BYTES:10485760}
supabase.storage.audio-max-size-bytes=${SUPABASE_STORAGE_AUDIO_MAX_SIZE_BYTES:52428800}

# Swagger / SpringDoc
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=natural
