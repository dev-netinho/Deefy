services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: deefy-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_RESET_EXPIRATION: ${JWT_RESET_EXPIRATION:-900000}
      JWT_ACCOUNT_ACTIVATION_EXPIRATION: ${JWT_ACCOUNT_ACTIVATION_EXPIRATION:-900000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      SERVER_PORT: 8080
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.deefy-api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.deefy-api.entrypoints=websecure
      - traefik.http.routers.deefy-api.tls=true
      - traefik.http.routers.deefy-api.tls.certresolver=let-enc
      - traefik.http.services.deefy-api.loadbalancer.server.port=8080

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: deefy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.deefy-frontend.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.deefy-frontend.entrypoints=websecure
      - traefik.http.routers.deefy-frontend.tls=true
      - traefik.http.routers.deefy-frontend.tls.certresolver=let-enc
      - traefik.http.services.deefy-frontend.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
