<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deefy API</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07100f;
        color: #f4fbf8;

      main {
        width: min(720px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid #29413d;

        color: #25f0c7;

  <body>
    <main>
      <h1>Documentacao da API Deefy</h1>
      <p>
        A documentacao interativa oficial fica no Swagger:

      </p>
      <p>
        Base publica da API: <code>/api/v1</code>.
      </p>
    </main>
  </body>
</html>
